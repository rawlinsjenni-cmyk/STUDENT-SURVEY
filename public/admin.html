<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Student Survey</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card card">
    <div class="login-logo">
      <div style="font-size:48px;">📋</div>
      <h2>Student Survey</h2>
      <p>Admin Access Only</p>
    </div>

    <div id="alert-box"></div>

    <form id="login-form" onsubmit="login(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary btn-full" style="margin-top:8px;">
        Sign In
      </button>
    </form>
  </div>
</div>

<script>
async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const alertBox = document.getElementById('alert-box');
  alertBox.innerHTML = '';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/admin/dashboard';
    } else {
      alertBox.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch {
    alertBox.innerHTML = `<div class="alert alert-error">Network error. Please try again.</div>`;
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
